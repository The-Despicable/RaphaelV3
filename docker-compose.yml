x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-host-config: &host-config
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  cai-service:
    build:
      context: ./cai-service
      dockerfile: Dockerfile
    ports:
      - "3201:3200"
    env_file: .env
    environment:
      - SERVICE_NAME=cai-service
      - RAPHAEL_PATH=/raphael
    volumes:
      - ./orchestrator:/raphael/orchestrator

    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - tor-proxy
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped
    <<: *host-config

  mhddos-service:
    <<: *host-config
    build:
      context: ./mhddos-service
      dockerfile: Dockerfile
    ports:
      - "3301:3300"
    env_file: .env
    environment:
      - SERVICE_NAME=mhddos-service
      - TOR_PROXY=socks5h://tor-proxy:9050
    cap_add:
      - NET_RAW
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - tor-proxy
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  cloak-service:
    <<: *host-config
    build:
      context: ./cloak-service
      dockerfile: Dockerfile
    ports:
      - "3401:3400"
    env_file: .env
    environment:
      - SERVICE_NAME=cloak-service
      - TOR_PROXY=socks5h://tor-proxy:9050
      - TOR_CONTROL=tor-proxy:9051
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - tor-proxy
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  c2-server:
    <<: *host-config
    build:
      context: ./c2-server
      dockerfile: Dockerfile
    ports:
      - "3501:3501"
    env_file: .env
    environment:
      - SERVICE_NAME=c2-server
      - RAPHAEL_PATH=/raphael
      - SLIVER_OPERATOR_CONFIG=/sliver-config/operator.cfg
    volumes:
      - ./orchestrator:/raphael/orchestrator
      - sliver-config:/sliver-config:rw
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - neo4j
      - sliver-server
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  phishing:
    <<: *host-config
    build:
      context: ./phishing
      dockerfile: Dockerfile
    ports:
      - "3502:3502"
    env_file: .env
    environment:
      - SERVICE_NAME=phishing
      - RAPHAEL_PATH=/raphael
    volumes:
      - ./orchestrator:/raphael/orchestrator
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  recon-pipeline:
    <<: *host-config
    build:
      context: ./recon-pipeline
      dockerfile: Dockerfile
    ports:
      - "3503:3503"
    env_file: .env
    environment:
      - SERVICE_NAME=recon-pipeline
      - RAPHAEL_PATH=/raphael
    volumes:
      - ./orchestrator:/raphael/orchestrator
      - case-data:/data
    cap_add:
      - NET_RAW
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - tor-proxy
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  sword:
    <<: *host-config
    build:
      context: .
      dockerfile: ./sword/Dockerfile
    ports:
      - "3600:3600"
    env_file: .env
    environment:
      - SERVICE_NAME=sword
    volumes:
      - ./orchestrator:/app/orchestrator
      - ./sword:/app/sword
    cap_add:
      - NET_RAW
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - cai-service
      - mhddos-service
      - cloak-service
      - c2-server
      - phishing
      - recon-pipeline
      - tor-proxy
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  autonomous-brain:
    <<: *host-config
    build:
      context: .
      dockerfile: ./brain/Dockerfile
    ports:
      - "3700:3700"
    env_file: .env
    environment:
      - SERVICE_NAME=autonomous-brain
      - OPENAI_BASE_URL=http://host.docker.internal:11434/v1
      - BRAIN_DB=/data/brain.db
      - TOR_SOCKS=tor-proxy:9050
      - TOR_CONTROL=tor-proxy:9051
      - SLIVER_OPERATOR_CONFIG=/sliver-config/operator.cfg
    volumes:
      - brain-data:/data
      - sliver-config:/sliver-config:rw
    cap_add:
      - NET_ADMIN
    depends_on:
      - tor-proxy
      - sliver-server
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  tor-proxy:
    # Pin to specific version for stability; update after testing
    image: dperson/torproxy:latest
    ports:
      - "9050:9050"
      - "9052:9051"
    environment:
      - PASSWORD=${TOR_CONTROL_PASS:-changeme}
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      raphael-net:
        aliases:
          - tor-proxy
    logging: *default-logging
    restart: unless-stopped

  sliver-server:
    build:
      context: ./sliver
      dockerfile: Dockerfile
    ports:
      - "31337:31337"
      - "31334:31334"
    volumes:
      - sliver-config:/config
      - sliver-data:/data
    environment:
      - SLIVER_LISEN_PORT=31337
    networks:
      raphael-net:
        aliases:
          - sliver-server
    logging: *default-logging
    restart: unless-stopped

  neo4j:
    # Pin to specific patch version for stability; update after testing
    image: neo4j:5-community
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASS:-raphael-dev}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=128M
      - NEO4J_dbms_memory_heap_max__size=256M
    volumes:
      - neo4j-data:/data
    networks:
      raphael-net:
        aliases:
          - neo4j
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  kali-tools:
    build:
      context: ./kali-tools
      dockerfile: Dockerfile
    # Pin to a specific tag after building for production; :latest may break on rebuild
    image: raphael/kali-tools:latest
    container_name: kali-tools
    hostname: kali-tools
    networks: [raphael-net]
    ports:
      - "3800:3800"
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    volumes:
      - ./orchestrator:/raphael/orchestrator:ro
      - ./data:/raphael/data
    environment:
      - TOOLS_PORT=3800
      - TZ=UTC
    logging: *default-logging
    restart: unless-stopped

  raphael-api:
    <<: *host-config
    build:
      context: .
      dockerfile: ./docker/api.Dockerfile
    ports:
      - "3900:3900"
    env_file: .env
    environment:
      - SERVICE_NAME=raphael-api
      - RAPHAEL_PATH=/raphael
      - CI_API_PORT=3900
    volumes:
      - ./orchestrator:/raphael/orchestrator
      - ./cli:/raphael/cli
      - ./data:/data
    depends_on:
      - tor-proxy
    networks:
      - raphael-net
    logging: *default-logging
    restart: unless-stopped

  caido:
    # Pin to specific version for stability; update after testing
    image: caido/caido:latest
    ports:
      - "48080:8080"
    environment:
      - CAIDO_PORT=8080
    networks:
      raphael-net:
        aliases:
          - caido
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  raphael-net:
    driver: bridge

volumes:
  brain-data:
  case-data:
  neo4j-data:
  sliver-config:
  sliver-data:
